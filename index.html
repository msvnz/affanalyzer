<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AffAnalyzer</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}
.container{
    max-width:800px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
}
input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}
button{
    width:100%;
    padding:12px;
    cursor:pointer;
}
.card{
    background:#f8f8f8;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}
</style>
</head>
<body>

<div class="container">

<h2>AffAnalyzer</h2>

<label>Spend Meta Ads (Rp)</label>
<input type="number" id="spend">

<label>Klik Meta Ads</label>
<input type="number" id="metaClick">

<label>Klik Shopee</label>
<input type="number" id="shopeeClick">

<label>Pesanan</label>
<input type="number" id="orders">

<label>Komisi Shopee (Rp)</label>
<input type="number" id="commission">

<button onclick="hitung()">Hitung KPI</button>

<div class="card">
<h3>Hasil</h3>

<p>CPC Meta: <span id="cpc">-</span></p>
<p>Conversion Rate: <span id="cr">-</span></p>
<p>Profit: <span id="profit">-</span></p>
<p>ROI: <span id="roi">-</span></p>

</div>

</div>

<script>

function rupiah(n){
    return "Rp " + Number(n).toLocaleString("id-ID");
}

function hitung(){

let spend = Number(document.getElementById("spend").value);
let metaClick = Number(document.getElementById("metaClick").value);
let shopeeClick = Number(document.getElementById("shopeeClick").value);
let orders = Number(document.getElementById("orders").value);
let commission = Number(document.getElementById("commission").value);

let cpc = metaClick ? spend/metaClick : 0;
let cr = shopeeClick ? (orders/shopeeClick)*100 : 0;
let profit = commission - spend;
let roi = spend ? ((profit/spend)*100) : 0;

document.getElementById("cpc").innerHTML = rupiah(cpc.toFixed(0));
document.getElementById("cr").innerHTML = cr.toFixed(2) + "%";
document.getElementById("profit").innerHTML = rupiah(profit.toFixed(0));
document.getElementById("roi").innerHTML = roi.toFixed(2) + "%";

}

</script>

</body>
</html>
