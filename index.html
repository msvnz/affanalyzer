<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AffAnalyzer</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}
input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
}
button{
    width:100%;
    padding:12px;
    cursor:pointer;
}
.card{
    background:#f8f8f8;
    padding:15px;
    margin-top:15px;
    border-radius:8px;
}
h2{
    margin-top:0;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

</head>
<body>

<div class="container">

<h2>AffAnalyzer CSV</h2>

<label>Meta Ads CSV</label>
<input type="file" id="metaCsv" accept=".csv">

<label>Shopee Click Report CSV</label>
<input type="file" id="clickCsv" accept=".csv">

<label>Affiliate Commission CSV</label>
<input type="file" id="commissionCsv" accept=".csv">

<button onclick="prosesData()">Hitung KPI</button>

<div class="card">
<h3>Hasil KPI</h3>

<p>Spend Meta : <b id="spend">-</b></p>
<p>Klik Meta : <b id="klikMeta">-</b></p>
<p>Klik Shopee : <b id="klikShopee">-</b></p>
<p>Pesanan : <b id="pesanan">-</b></p>
<p>Komisi : <b id="komisi">-</b></p>

<hr>

<p>CPC Meta : <b id="cpc">-</b></p>
<p>Conversion Rate : <b id="cr">-</b></p>
<p>Profit : <b id="profit">-</b></p>
<p>ROI : <b id="roi">-</b></p>

</div>

</div>

<script>

function rupiah(x){
    return "Rp " + Number(x).toLocaleString("id-ID");
}

function parseFile(fileInput){

    return new Promise((resolve,reject)=>{

        const file = fileInput.files[0];

        if(!file){
            reject("File belum dipilih");
            return;
        }

        Papa.parse(file,{
            header:true,
            skipEmptyLines:true,
            complete:function(results){
                resolve(results.data);
            }
        });

    });

}

async function prosesData(){

try{

const metaRows =
await parseFile(document.getElementById("metaCsv"));

const clickRows =
await parseFile(document.getElementById("clickCsv"));

const commissionRows =
await parseFile(document.getElementById("commissionCsv"));

let spend = 0;
let klikMeta = 0;

metaRows.forEach(row=>{

    const spendValue =
        parseFloat(
            String(row["Jumlah yang dibelanjakan (IDR)"] || "0")
            .replace(/,/g,"")
        ) || 0;

    const clickValue =
        parseFloat(
            String(row["Klik Tautan Unik"] || "0")
            .replace(/,/g,"")
        ) || 0;

    spend += spendValue;
    klikMeta += clickValue;

});

const klikShopee = clickRows.length;

const pesanan = commissionRows.length;

let komisi = 0;

commissionRows.forEach(row=>{

    const nilai =
        parseFloat(
            String(row["Komisi Bersih Affiliate (Rp)"] || "0")
            .replace(/,/g,"")
        ) || 0;

    komisi += nilai;

});

const cpc =
klikMeta > 0
? spend / klikMeta
: 0;

const cr =
klikShopee > 0
? (pesanan / klikShopee) * 100
: 0;

const profit =
komisi - spend;

const roi =
spend > 0
? (profit / spend) * 100
: 0;

document.getElementById("spend").innerHTML =
rupiah(spend.toFixed(0));

document.getElementById("klikMeta").innerHTML =
klikMeta.toLocaleString("id-ID");

document.getElementById("klikShopee").innerHTML =
klikShopee.toLocaleString("id-ID");

document.getElementById("pesanan").innerHTML =
pesanan.toLocaleString("id-ID");

document.getElementById("komisi").innerHTML =
rupiah(komisi.toFixed(0));

document.getElementById("cpc").innerHTML =
rupiah(cpc.toFixed(0));

document.getElementById("cr").innerHTML =
cr.toFixed(2) + "%";

document.getElementById("profit").innerHTML =
rupiah(profit.toFixed(0));

document.getElementById("roi").innerHTML =
roi.toFixed(2) + "%";

}
catch(err){

alert(err);

}

}

</script>

</body>
</html>
