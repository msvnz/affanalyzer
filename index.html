<!doctype html>
<html lang="id"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AffAnalyzer Full</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head><body class="bg-light">
<div class="container py-4">
<h2>AffAnalyzer Full</h2>
<div class="card p-3 mb-3">
<label>Meta Ads CSV</label><input type="file" id="meta" class="form-control mb-2">
<label>Shopee Click CSV</label><input type="file" id="click" class="form-control mb-2">
<label>Commission CSV</label><input type="file" id="comm" class="form-control mb-2">
<button class="btn btn-primary" onclick="processFiles()">Hitung KPI</button>
<button class="btn btn-success ms-2" onclick="saveToday()">Simpan Hari Ini</button>
</div>
<div id="kpi" class="row"></div>
<div class="card p-3 mb-3"><canvas id="chart"></canvas></div>
<div class="card p-3"><h4>Riwayat</h4><table class="table" id="history"></table></div>
</div>
<script src="app.js"></script>
</body></html>
